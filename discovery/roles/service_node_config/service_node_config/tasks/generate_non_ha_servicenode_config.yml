- name: Create directories for each service tag 
  ansible.builtin.file:
    path: "{{ service_node_dir }}"
    state: directory
    mode: "{{ file_permissions }}"
  loop: "{{ service_nodes.query_result }}"
  loop_control:
    label: "{{ item.service_tag }}"

