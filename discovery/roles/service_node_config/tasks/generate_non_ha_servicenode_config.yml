# 1. Create map of node_service_tag to node info
- name: Create map of node_service_tag to full node info
  set_fact:
    node_info_map: >-
      {{
        dict(service_nodes.query_result | map(attribute='service_tag') | zip(service_nodes.query_result))
      }}

- name: Debug node_info_map to verify data structure
  debug:
    msg: "{{ node_info_map }}"

# 2. Create directories for each service tag at /opt/omnia/service_nodes/
- name: Create directories for each service tag at /opt/omnia/service_nodes/
  ansible.builtin.file:
    path: "/opt/omnia/service_nodes/{{ item.service_tag }}"
    state: directory
    mode: '0755'
  loop: "{{ service_nodes.query_result }}"
  loop_control:
    label: "{{ item.service_tag }}"

# 3. Debug service_admin_nic_ip
- name: Debug service_admin_nic_ip
  debug:
    msg: "{{ service_admin_nic_ip }}"
  loop: "{{ service_nodes.query_result }}"
  loop_control:
    loop_var: node
  vars:
    service_admin_nic_ip: "{{ node.admin_ip }}"

# 4. Render corosync.conf for non-HA nodes (excluding passive)
- name: Render corosync.conf for non-HA nodes
  loop: "{{ service_nodes.query_result }}"
  loop_control:
    loop_var: node
  when: node.service_tag not in service_node_ha_data.service_nodes | map(attribute='active_node_service_tag') | list
  vars:
    service_admin_nic_ip: "{{ node.admin_ip }}"
    service_node_name: "{{ node.hostname }}"
  ansible.builtin.template:
    src: corosync_non_ha.conf.j2
    dest: "/opt/omnia/service_nodes/{{ node.service_tag }}/corosync.conf"

# 5. Generate omnia_pcs.container for non-HA nodes
- name: Generate omnia_pcs.container for non-HA nodes
  template:
    src: omnia_pcs.container.j2
    dest: "/opt/omnia/service_nodes/{{ node.service_tag }}/omnia_pcs.container"
  loop: "{{ service_nodes.query_result }}"
  loop_control:
    loop_var: node
  when: node.service_tag not in service_node_ha_data.service_nodes | map(attribute='active_node_service_tag') | list
  vars:
    node_info: "{{ node }}"  # Pass the node information for each non-HA node

# 6. Generate pcs-start.sh for non-HA nodes
- name: Generate pcs-start.sh for non-HA nodes
  template:
    src: pcs-start.sh.j2
    dest: "/opt/omnia/service_nodes/{{ node.service_tag }}/pcs-start.sh"
    mode: '0755'
  loop: "{{ service_nodes.query_result }}"
  loop_control:
    loop_var: node
  when: node.service_tag not in service_node_ha_data.service_nodes | map(attribute='active_node_service_tag') | list
  vars:
    item: "{{ node }}"  # Pass the node object
    pcs_group: "omnia"
    monitor_interval: "30s"
    ha_migration_threshold: 3
