# 1. Create map of node_service_tag to full node info
- name: Create map of node_service_tag to full node info
  set_fact:
    node_info_map: >-
      {{
        dict(service_nodes.query_result | map(attribute='service_tag') | zip(service_nodes.query_result))
      }}

- name: Debug node_info_map to verify data structure
  debug:
    msg: "{{ node_info_map }}"

# 2. Create directories for active and non-HA service tags at /opt/omnia/service_nodes/
- name: Create directories for active and non-HA service tags at /opt/omnia/service_nodes/
  ansible.builtin.file:
    path: "/opt/omnia/service_nodes/{{ item.service_tag }}"
    state: directory
    mode: '0755'
  loop: "{{ service_nodes.query_result }}"
  loop_control:
    label: "{{ item.service_tag }}"
  when: item.ha_enabled | default(true)  # Create directories only for active or non-HA nodes

# 3. Debug service_admin_nic_ip
- name: Debug service_admin_nic_ip
  debug:
    msg: "{{ service_admin_nic_ip }}"
  loop: "{{ service_nodes.query_result }}"
  loop_control:
    loop_var: node
  vars:
    service_admin_nic_ip: "{{ node.admin_ip }}"

# 4. Render corosync.conf for non-HA nodes using minimal template
- name: Render corosync.conf for non-HA nodes (minimal template)
  loop: "{{ service_nodes.query_result }}"
  loop_control:
    loop_var: node
  vars:
    service_admin_nic_ip: "{{ node.admin_ip }}"
    service_node_name: "{{ node.hostname }}"
  ansible.builtin.template:
    src: corosync_non_ha.conf.j2   # Minimal template for non-HA nodes
    dest: "/opt/omnia/service_nodes/{{ node.service_tag }}/corosync.conf"
  when: not node.ha_enabled | default(true)  # Only for non-HA nodes

# 5. Render corosync.conf for HA active nodes
- name: Render corosync.conf for HA active nodes
  when: service_node_ha_data.enable_service_ha | default(false)
  loop: "{{ service_node_ha_data.service_nodes }}"
  loop_control:
    loop_var: ha_group
  vars:
    active_node: "{{ node_info_map[ha_group.active_node_service_tag] }}"
  ansible.builtin.template:
    src: corosync_HA.conf.j2
    dest: "/opt/omnia/service_nodes/{{ ha_group.active_node_service_tag }}/corosync.conf"

# 5.1 Render corosync.conf for HA passive nodes (same as active)
- name: Render corosync.conf for each passive node in all HA groups
  when: service_node_ha_data.enable_service_ha | default(false)
  vars:
    passive_nodes: >-
      {{
        service_node_ha_data.service_nodes
        | map(attribute='passive_nodes')
        | map('first')
        | map(attribute='node_service_tags')
        | flatten
      }}
  loop: "{{ passive_nodes }}"
  loop_control:
    loop_var: passive_tag
  vars:
    node: "{{ node_info_map[passive_tag] }}"
  ansible.builtin.template:
    src: corosync_HA.conf.j2
    dest: "/opt/omnia/service_nodes/{{ passive_tag }}/corosync.conf"


# 6. Render omnia_pcs.container file per service node
- name: Render omnia_pcs.container file per service node
  ansible.builtin.template:
    src: omnia_pcs.container.j2
    dest: "/opt/omnia/service_nodes/{{ item.service_tag }}/omnia_pcs.container"
    mode: '0644'
  loop: "{{ service_nodes.query_result }}"
  loop_control:
    label: "{{ item.service_tag }}"
